<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <title>餐廳菜單與購物車</title>
  <style>
    .highlighted-food {
      border: 4px solid gold;
      box-shadow: 0 0 10px gold;
      border-radius: 10px;
    }

    .highlighted-food {
      border: 4px solid gold;
      box-shadow: 0 0 15px gold;
      border-radius: 10px;
      animation: blink 1s infinite alternate;
    }

    @keyframes blink {
      from {
        box-shadow: 0 0 10px gold;
      }

      to {
        box-shadow: 0 0 20px orange;
      }
    }
  </style>
  <link rel="stylesheet" href="./css/food.css">
</head>

<body>

  <!-- 菜單區 -->
  <div class="overlay menu-section">
    <!-- 新增：返回 choose.html 按鈕 -->
  <button class="back-to-choose" id="back-to-choose-btn">← 返回選擇頁面</button>
    <h1 id="restaurant-name">餐廳名稱</h1>
    <div class="description" id="restaurant-description">介紹文字</div>
    <div class="menu-container" id="menu-container"></div>
    <button class="checkout" id="show-cart-btn">查看購物車</button>
  </div>

  <!-- 購物車區 -->
  <div class="overlay cart-section">
    <div class="back-button" id="back-to-menu">返回</div>
    <div class="cart-menu-container" id="cart-menu-container"></div>
    <div class="total-section">
      <div class="price-label" id="total-price">價格：$0 元</div><br />
      <button class="buy-button" id="buy-button">購買</button>
    </div>
  </div>

  <script src="./script/restaurants.js"></script>
  <script src="./script/food.js"></script>
</body>

</html>
